name: Apply D1 migrations

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/apply-d1-migrations.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  migrate:
    name: Apply sourcerer-db migrations
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install worker dependencies
        run: npm install
        working-directory: workers/api

      - name: Apply production D1 migrations
        run: |
          set -o pipefail
          npx wrangler d1 migrations apply sourcerer-db --remote 2>&1 | tee migration-output.log
        working-directory: workers/api

      - name: Upload migration output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: d1-migration-output
          path: workers/api/migration-output.log
