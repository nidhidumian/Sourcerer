name = "sourcerer-api"
main = "src/index.js"
compatibility_date = "2026-06-19"
workers_dev = true

# Secrets (set via `wrangler secret put`, NOT here): OPENAI_API_KEY, EXA_API_KEY,
# FIRECRAWL_API_KEY (TICKET-006 — company research scraping).
[vars]
OPENAI_MODEL = "gpt-5.5"
OPENAI_ANALYZE_MONTHLY_LIMIT = "300"
OPENAI_MAX_OUTPUT_TOKENS = "900"
OPENAI_RESEARCH_MAX_OUTPUT_TOKENS = "1600"
EXA_SEARCH_MONTHLY_LIMIT = "300"
EXA_EVENTS_MAX_QUERIES = "10"
EXA_RESULTS_PER_QUERY = "5"
EXA_MAX_EVENTS = "12"
EVENTS_LOOKAHEAD_MONTHS = "12"
EVENTS_CACHE_VERSION = "4"
# Comma-separated extra spam host substrings to block from event results.
EVENTS_SPAM_DOMAINS = ""

[[d1_databases]]
binding = "DB"
database_name = "sourcerer-db"
database_id = "2ce0fa48-be71-4319-b80f-b9cef8968aff"
migrations_dir = "../../migrations"
